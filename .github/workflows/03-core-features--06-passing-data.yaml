name: Passing Variables Between jobs
on:
  workflow_dispatch:

env:
  MY_ENV: alex

jobs:
  producer:
    runs-on: ubuntu-24.04
    environment: prod
    env:
      MY_SECRET: ${{secrets.TEST}}
    outputs:
      test: ${{ steps.generate-test-variable.outputs.test }}
    steps:
      - name: Generate test variable
        id: generate-test-variable
        shell: bash
        run: |
          test=$MY_SECRET

          echo "test=${test}" >> "$GITHUB_OUTPUT"
          echo "TEST=${test}" >> "$GITHUB_ENV"

      - name: Inspect values inside producer
        run: |
          echo "TEST (set via GITHUB_ENV):   $TEST"
          echo "test (step output):          ${{steps.generate-test-variable.outputs.test}}"
